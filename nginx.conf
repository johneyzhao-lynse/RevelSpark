# Nginx Configuration for Lynse

# HTTP server block for redirecting to HTTPS
server {
    listen 80;
    server_name lynse.cn www.lynse.cn;
    return 301 https://$host$request_uri;
}

# HTTPS server block with SSL configuration
server {
    listen 443 ssl http2;
    server_name lynse.cn www.lynse.cn;

    # SSL certificate files
    ssl_certificate /etc/nginx/ssl/lynse.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/lynse.cn.key;

    # Basic SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Handle static files and SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied no-cache no-store private expired auth;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}