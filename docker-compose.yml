version: '3.8'

services:
  web:
    build: .
    container_name: lynse-web
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # 挂载目录配置
    volumes:
      # 可选：挂载日志目录
      # - ./logs:/var/log/nginx
      # SSL证书挂载（替换为您的实际证书路径）
      # - /path/to/ssl:/etc/nginx/ssl:ro
    # 可选：添加健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s